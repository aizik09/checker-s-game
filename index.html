<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Checkers</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; font-family: 'Crimson Pro', serif; }
        @keyframes pulse-glow {
          0%, 100% { box-shadow: 0 0 6px 1px rgba(212,168,67,0.3); }
          50% { box-shadow: 0 0 14px 4px rgba(212,168,67,0.6); }
        }
        .animate-pulse-glow { animation: pulse-glow 1.2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;

        const EMPTY = 0, WHITE = 1, BLACK = 2, WHITE_KING = 3, BLACK_KING = 4;
        const isWhite = (p) => p === WHITE || p === WHITE_KING;
        const isBlack = (p) => p === BLACK || p === BLACK_KING;
        const isKing = (p) => p === WHITE_KING || p === BLACK_KING;
        const owns = (p, player) => player === "white" ? isWhite(p) : isBlack(p);
        const opponent = (player) => player === "white" ? "black" : "white";

        function initBoard() {
          const b = Array(8).fill(null).map(() => Array(8).fill(EMPTY));
          for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
              if ((r + c) % 2 === 1) {
                if (r < 3) b[r][c] = BLACK;
                else if (r > 4) b[r][c] = WHITE;
              }
            }
          }
          return b;
        }

        function getJumps(board, r, c, player) {
          const piece = board[r][c];
          const jumps = [];
          if (!owns(piece, player)) return jumps;

          const king = isKing(piece);
          const oppFn = player === "white" ? isBlack : isWhite;
          const dirs = [[-1, -1], [-1, 1], [1, -1], [1, 1]];

          if (king) {
            for (const [dr, dc] of dirs) {
              let nr = r + dr, nc = c + dc;
              while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                if (owns(board[nr][nc], player)) break; 
                if (oppFn(board[nr][nc])) {
                  let lr = nr + dr, lc = nc + dc;
                  while (lr >= 0 && lr < 8 && lc >= 0 && lc < 8 && board[lr][lc] === EMPTY) {
                    jumps.push({
                      from: [r, c], to: [lr, lc],
                      captured: [nr, nc],
                      capturedPiece: board[nr][nc],
                    });
                    lr += dr; lc += dc;
                  }
                  break; 
                }
                nr += dr; nc += dc;
              }
            }
          } else {
            for (const [dr, dc] of dirs) {
              const mr = r + dr, mc = c + dc; 
              const tr = r + 2 * dr, tc = c + 2 * dc; 
              if (tr < 0 || tr >= 8 || tc < 0 || tc >= 8) continue;
              if (oppFn(board[mr][mc]) && board[tr][tc] === EMPTY) {
                jumps.push({
                  from: [r, c], to: [tr, tc],
                  captured: [mr, mc],
                  capturedPiece: board[mr][mc],
                });
              }
            }
          }
          return jumps;
        }

        function getMoves(board, r, c, player) {
          const piece = board[r][c];
          if (!owns(piece, player)) return [];
          const king = isKing(piece);
          const moves = [];
          const allDirs = [[-1, -1], [-1, 1], [1, -1], [1, 1]];

          if (king) {
            for (const [dr, dc] of allDirs) {
              let nr = r + dr, nc = c + dc;
              while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === EMPTY) {
                moves.push({ from: [r, c], to: [nr, nc] });
                nr += dr; nc += dc;
              }
            }
          } else {
            for (const [dr, dc] of allDirs) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === EMPTY) {
                const isForward = player === "white" ? dr < 0 : dr > 0;
                if (isForward) {
                  moves.push({ from: [r, c], to: [nr, nc] });
                }
              }
            }
          }
          return moves;
        }

        function getAllJumps(board, player) {
          const all = [];
          for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++)
              all.push(...getJumps(board, r, c, player));
          return all;
        }

        function getAllMoves(board, player) {
          const all = [];
          for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++)
              all.push(...getMoves(board, r, c, player));
          return all;
        }

        function applyMove(board, move) {
          const nb = board.map(r => [...r]);
          const [fr, fc] = move.from;
          const [tr, tc] = move.to;
          let piece = nb[fr][fc];
          nb[fr][fc] = EMPTY;
          if (move.captured) nb[move.captured[0]][move.captured[1]] = EMPTY;
          
          if (piece === WHITE && tr === 0) piece = WHITE_KING;
          if (piece === BLACK && tr === 7) piece = BLACK_KING;
          nb[tr][tc] = piece;
          return nb;
        }

        function checkWinner(board) {
          let whites = 0, blacks = 0;
          for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++) {
              if (isWhite(board[r][c])) whites++;
              if (isBlack(board[r][c])) blacks++;
            }
          if (whites === 0) return "black";
          if (blacks === 0) return "white";
          return null;
        }

        function evaluateBoard(board) {
          let score = 0;
          for (let r = 0; r < 8; r++)
            for (let c = 0; c < 8; c++) {
              const p = board[r][c];
              if (p === BLACK) score += 1 + 0.1 * r;
              else if (p === BLACK_KING) score += 3;
              else if (p === WHITE) score -= (1 + 0.1 * (7 - r));
              else if (p === WHITE_KING) score -= 3;
            }
          return score;
        }

        function minimax(board, depth, alpha, beta, isAI) {
          const winner = checkWinner(board);
          if (winner === "black") return 1000 + depth;
          if (winner === "white") return -1000 - depth;
          if (depth === 0) return evaluateBoard(board);

          const player = isAI ? "black" : "white";
          const jumps = getAllJumps(board, player);
          const moves = jumps.length > 0 ? jumps : getAllMoves(board, player);

          if (moves.length === 0) return isAI ? -1000 : 1000;

          if (isAI) {
            let maxEval = -Infinity;
            for (const m of moves) {
              const nextBoard = applyMove(board, m);
              const ev = minimax(nextBoard, depth - 1, alpha, beta, false);
              maxEval = Math.max(maxEval, ev);
              alpha = Math.max(alpha, ev);
              if (beta <= alpha) break;
            }
            return maxEval;
          } else {
            let minEval = Infinity;
            for (const m of moves) {
              const nextBoard = applyMove(board, m);
              const ev = minimax(nextBoard, depth - 1, alpha, beta, true);
              minEval = Math.min(minEval, ev);
              beta = Math.min(beta, ev);
              if (beta <= alpha) break;
            }
            return minEval;
          }
        }

        function getBestAIMove(board) {
          const jumps = getAllJumps(board, "black");
          const moves = jumps.length > 0 ? jumps : getAllMoves(board, "black");
          if (moves.length === 0) return null;

          let bestMove = moves[0];
          let bestScore = -Infinity;

          for (const m of moves) {
            const nextBoard = applyMove(board, m);
            const score = minimax(nextBoard, 4, -Infinity, Infinity, false);
            if (score > bestScore) {
              bestScore = score;
              bestMove = m;
            }
          }
          return bestMove;
        }

        function Piece({ player, king, selected, mustJump }) {
          const isW = player === "white";
          return (
            <div className="w-full h-full flex items-center justify-center p-[8%]">
              <div
                className="w-full h-full rounded-full relative flex items-center justify-center"
                style={{
                  background: isW
                    ? selected
                      ? "radial-gradient(circle at 35% 30%, #ffffff, #dcdcdc)"
                      : "radial-gradient(circle at 35% 30%, #fcfaf2, #e3dfd5)"
                    : selected
                      ? "radial-gradient(circle at 35% 30%, #5a5a5a, #141414)"
                      : "radial-gradient(circle at 35% 30%, #3a3a3a, #0a0a0a)",
                  boxShadow: selected
                    ? `0 0 0 3px #d4a843, 0 6px 20px rgba(0,0,0,0.6), inset 0 -3px 6px rgba(0,0,0,0.3)`
                    : `0 4px 10px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.4), inset 0 2px 3px rgba(255,255,255,0.1)`,
                  transform: selected ? "scale(1.08)" : "scale(1)",
                  transition: "transform 0.15s ease, box-shadow 0.15s ease",
                  border: mustJump ? "2.5px solid #d4a843" : isW ? "1px solid #c2bebc" : "1px solid #222",
                }}
              >
                <div
                  className="absolute rounded-full w-[35%] h-[20%] top-[12%] left-[18%]"
                  style={{
                    background: isW ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.15)",
                    filter: "blur(1px)",
                  }}
                />
                {king && (
                  <span className="text-[clamp(14px,4vw,26px)] leading-none select-none text-amber-500" style={{
                    filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))",
                  }}>
                    ♛
                  </span>
                )}
              </div>
            </div>
          );
        }

        function App() {
          const [board, setBoard] = useState(initBoard);
          const [turn, setTurn] = useState("white");
          const [gameMode, setGameMode] = useState("ai"); // 'ai' или 'pvp'
          const [selected, setSelected] = useState(null);
          const [winner, setWinner] = useState(null);

          const activeJumps = getAllJumps(board, turn);
          const hasMustJump = activeJumps.length > 0;

          useEffect(() => {
            if (gameMode === "ai" && turn === "black" && !winner) {
              const timer = setTimeout(() => {
                const aiMove = getBestAIMove(board);
                if (aiMove) {
                  const nextBoard = applyMove(board, aiMove);
                  setBoard(nextBoard);
                  
                  // Проверка на серийное взятие для ИИ
                  if (aiMove.captured) {
                    const extraJumps = getJumps(nextBoard, aiMove.to[0], aiMove.to[1], "black");
                    if (extraJumps.length > 0) {
                      // ИИ продолжает бить
                      return;
                    }
                  }
                  
                  const win = checkWinner(nextBoard);
                  if (win) setWinner(win);
                  else setTurn("white");
                } else {
                  setWinner("white");
                }
              }, 600);
              return () => clearTimeout(timer);
            }
          }, [turn, board, gameMode, winner]);

          const handleCellClick = (r, c) => {
            if (gameMode === "ai" && turn === "black") return;
            if (winner) return;

            const piece = board[r][c];

            if (owns(piece, turn)) {
              if (hasMustJump) {
                const piecesThatCanJump = activeJumps.map(j => j.from.toString());
                if (!piecesThatCanJump.includes([r, c].toString())) return;
              }
              setSelected([r, c]);
              return;
            }

            if (selected) {
              const [fr, fc] = selected;
              const availableJumps = getJumps(board, fr, fc, turn);
              const availableMoves = getMoves(board, fr, fc, turn);
              
              const currentValidMoves = hasMustJump ? availableJumps : availableMoves;
              const chosenMove = currentValidMoves.find(m => m.to[0] === r && m.to[1] === c);

              if (chosenMove) {
                const nextBoard = applyMove(board, chosenMove);
                setBoard(nextBoard);

                if (chosenMove.captured) {
                  const comboJumps = getJumps(nextBoard, r, c, turn);
                  if (comboJumps.length > 0) {
                    setSelected([r, c]);
                    const win = checkWinner(nextBoard);
                    if (win) setWinner(win);
                    return;
                  }
                }

                setSelected(null);
                const win = checkWinner(nextBoard);
                if (win) {
                  setWinner(win);
                } else {
                  setTurn(opponent(turn));
                }
              }
            }
          };

          const resetGame = () => {
            setBoard(initBoard());
            setTurn("white");
            setSelected(null);
            setWinner(null);
          };

          return (
            <div className="min-h-screen text-slate-100 flex flex-col items-center justify-center p-4">
              <div className="max-w-md w-full flex flex-col items-center">
                <h1 className="text-4xl font-bold font-['Cinzel'] tracking-wider text-amber-500 mb-2">CHECKERS</h1>
                
                <div className="flex gap-2 mb-6 bg-slate-800/80 p-1 rounded-xl border border-slate-700/50 shadow-lg">
                  <button 
                    onClick={() => { setGameMode("ai"); resetGame(); }}
                    className={`px-4 py-2 rounded-lg font-medium text-sm transition-all duration-200 ${gameMode === 'ai' ? 'bg-amber-500 text-slate-950 font-bold shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                  >
                    Игра против ИИ
                  </button>
                  <button 
                    onClick={() => { setGameMode("pvp"); resetGame(); }}
                    className={`px-4 py-2 rounded-lg font-medium text-sm transition-all duration-200 ${gameMode === 'pvp' ? 'bg-amber-500 text-slate-950 font-bold shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                  >
                    Вдвоем (PvP)
                  </button>
                </div>

                <div className="w-full aspect-square bg-slate-950 p-[2%] rounded-2xl shadow-2xl border border-slate-800 relative mb-6">
                  <div className="w-full h-full grid grid-cols-8 grid-rows-8 rounded-lg overflow-hidden border border-slate-900 shadow-inner">
                    {board.map((row, r) =>
                      row.map((piece, c) => {
                        const isDarkCell = (r + c) % 2 === 1;
                        const isSelected = selected && selected[0] === r && selected[1] === c;
                        
                        let isTargetHint = false;
                        if (selected) {
                          const [fr, fc] = selected;
                          const valid = hasMustJump ? getJumps(board, fr, fc, turn) : getMoves(board, fr, fc, turn);
                          isTargetHint = valid.some(m => m.to[0] === r && m.to[1] === c);
                        }

                        let pieceCanJumpHint = false;
                        if (hasMustJump && owns(piece, turn)) {
                          pieceCanJumpHint = activeJumps.some(j => j.from[0] === r && j.from[1] === c);
                        }

                        return (
                          <div
                            key={`${r}-${c}`}
                            onClick={() => handleCellClick(r, c)}
                            className="relative flex items-center justify-center cursor-pointer select-none transition-colors duration-150"
                            style={{ backgroundColor: isDarkCell ? "#1e293b" : "#f1f5f9" }}
                          >
                            {piece !== EMPTY && (
                              <Piece
                                player={isWhite(piece) ? "white" : "black"}
                                king={isKing(piece)}
                                selected={isSelected}
                                mustJump={pieceCanJumpHint}
                              />
                            )}
                            {isTargetHint && (
                              <div className="absolute w-[30%] h-[30%] rounded-full bg-emerald-500/40 border border-emerald-400/70 shadow-[0_0_8px_rgba(52,211,153,0.5)] animate-pulse" />
                            )}
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

                <div className="w-full bg-slate-900/60 backdrop-blur-md rounded-xl p-4 border border-slate-800 text-center shadow-md">
                  {winner ? (
                    <div className="text-xl font-bold text-emerald-400 font-['Cinzel'] tracking-wide">
                      Победили {winner === 'white' ? 'Белые' : 'Черные'}! 🎉
                    </div>
                  ) : (
                    <div className="flex justify-between items-center px-4">
                      <span className="text-slate-400 text-sm">Текущий ход:</span>
                      <span className={`text-base font-bold uppercase tracking-widest ${turn === 'white' ? 'text-amber-400' : 'text-slate-300'}`}>
                        {turn === 'white' ? 'Белые' : 'Черные'} {gameMode === 'ai' && turn === 'black' && '(ИИ...)'}
                      </span>
                    </div>
                  )}
                </div>

                <button 
                  onClick={resetGame}
                  className="mt-4 px-6 py-2.5 bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700/80 rounded-xl font-medium border border-slate-700/50 shadow-md transition-all duration-200"
                >
                  Начать заново
                </button>
              </div>
            </div>
          );
        }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          // Фикс опечатки в вызове библиотеки рендеринга для Babel
          root.render(<App />);
    </script>
</body>
</html>
